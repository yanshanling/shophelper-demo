<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ShopHelper — 跨境电商多语言客服 Agent</title>
<style>
/* ════════════════════════════════════════════════
   Mobile-First 基础样式
   ════════════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f5f7fb; color: #1a1a2e;
  font-size: 14px; line-height: 1.5;
  display: flex; flex-direction: column;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* ── 遮罩层（移动端侧栏展开时） ── */
.overlay {
  display: none;
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 90; transition: opacity 0.3s;
}
.overlay.open { display: block; }

/* ════════════════════════════════════════════════
   侧边栏 — 桌面端固定左侧，移动端抽屉滑动
   ════════════════════════════════════════════════ */
.sidebar {
  width: 280px; min-width: 280px; max-width: 280px;
  background: white; border-right: 1px solid #e5e7eb;
  display: flex; flex-direction: column;
  padding: 16px; gap: 12px;
  overflow-y: auto; overflow-x: hidden;
  height: 100vh;
  position: fixed; left: 0; top: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}
.sidebar-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 17px; font-weight: 700;
  padding-bottom: 8px;
}
.sidebar-logo span { font-size: 26px; }

/* Eval 指标 */
.metrics-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
}
.metric-card {
  background: #f9fafb; border-radius: 8px;
  padding: 10px; text-align: center;
  border: 1px solid #f3f4f6;
}
.metric-value { font-size: 19px; font-weight: 700; color: #667eea; }
.metric-label { font-size: 11px; color: #6b7280; margin-top: 2px; }

.section-title {
  font-size: 13px; font-weight: 600; color: #374151;
  padding: 4px 0;
}

/* 场景按钮 */
.scenario-btn {
  width: 100%; text-align: left;
  padding: 9px 12px; margin: 2px 0;
  border: 1px solid #e5e7eb; border-radius: 8px;
  cursor: pointer; background: white;
  font-size: 13px; font-family: inherit;
  transition: all 0.15s;
}
.scenario-btn:active, .scenario-btn:hover {
  background: #f0f2ff; border-color: #667eea; color: #667eea;
}

.sidebar-footer {
  font-size: 11px; color: #9ca3af;
  margin-top: auto; padding-top: 10px;
  border-top: 1px solid #f3f4f6;
}

/* ── 移动端侧栏关闭按钮 ── */
.sidebar-close {
  display: none;
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px;
  border-radius: 50%; background: #f3f4f6; border: none;
  font-size: 18px; cursor: pointer; line-height: 32px;
  text-align: center; color: #6b7280;
}

/* ════════════════════════════════════════════════
   主区域
   ════════════════════════════════════════════════ */
.main {
  margin-left: 280px; /* 桌面端留出侧栏空间 */
  flex: 1; display: flex; flex-direction: column;
  min-height: 100vh; height: 100vh;
}

/* ── 顶部导航栏 ── */
.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding: 12px 16px; color: white;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  min-height: 48px;
}
.header .hamburger {
  display: none;
  width: 36px; height: 36px;
  border: none; background: rgba(255,255,255,0.2);
  border-radius: 8px; color: white; font-size: 20px;
  cursor: pointer; flex-shrink: 0;
  align-items: center; justify-content: center;
}
.header-info { flex: 1; min-width: 0; }
.header h1 { font-size: 16px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header p { opacity: 0.85; font-size: 11px; display: none; }
@media (min-width: 769px) { .header p { display: block; } }

/* ── 对话区 ── */
.chat {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 10px;
  -webkit-overflow-scrolling: touch;
}
.msg {
  max-width: 88%; padding: 10px 14px; border-radius: 16px;
  font-size: 14px; line-height: 1.55; word-break: break-word;
}
.msg.user {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white; border-bottom-right-radius: 4px;
  align-self: flex-end;
  box-shadow: 0 2px 8px rgba(102,126,234,0.3);
}
.msg.agent {
  background: #f0f2f6; color: #1a1a2e;
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  white-space: pre-wrap; align-self: flex-start;
}

/* ── 思考过程 ── */
.trace-toggle {
  font-size: 12px; color: #6b7280; cursor: pointer;
  padding: 6px 0; margin-top: 4px;
  display: flex; align-items: center; gap: 4px;
  user-select: none; flex-wrap: wrap;
}
.trace-toggle:active { color: #667eea; }
.trace-panel { display: none; margin-top: 6px; }
.trace-panel.open { display: block; }
.trace-card {
  background: #fffbeb; border: 1px solid #fcd34d;
  border-radius: 8px; padding: 6px 8px;
  margin: 3px 0; font-size: 11px;
  display: flex; align-items: flex-start; gap: 6px;
  flex-wrap: wrap;
}
.trace-icon { font-size: 13px; flex-shrink: 0; }
.trace-label { font-weight: 600; color: #92400e; flex-shrink: 0; min-width: 60px; }
.trace-detail { color: #78350f; flex: 1; min-width: 120px; }

/* ── 标签 ── */
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 20px;
  font-size: 10px; font-weight: 600; margin-left: 4px;
  line-height: 1.4;
}
.badge-en { background: #dbeafe; color: #1e40af; }
.badge-zh { background: #fce7f3; color: #9d174d; }
.badge-auto { background: #d1fae5; color: #065f46; }
.badge-escalate { background: #fee2e2; color: #991b1b; }

/* ── 输入区（底部固定） ── */
.input-area {
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  border-top: 1px solid #e5e7eb;
  background: white;
  display: flex; gap: 8px; align-items: center;
  flex-shrink: 0;
}
.input-area input {
  flex: 1; min-width: 0;
  padding: 10px 14px;
  border: 2px solid #e5e7eb; border-radius: 22px;
  font-size: 14px; outline: none; font-family: inherit;
  transition: border-color 0.2s;
}
.input-area input:focus { border-color: #667eea; }
.input-area button {
  padding: 10px 18px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white; border: none; border-radius: 22px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  flex-shrink: 0;
  transition: opacity 0.15s;
  min-height: 42px;
}
.input-area button:active, .input-area button:hover { opacity: 0.85; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── 欢迎消息 ── */
.welcome {
  text-align: center; color: #6b7280;
  padding: 20px 14px; max-width: 480px; margin: 0 auto;
}
.welcome-icon { font-size: 42px; margin-bottom: 12px; }
.welcome h2 { font-size: 17px; color: #374151; margin-bottom: 10px; }
.welcome p { font-size: 13px; line-height: 1.7; }

/* ════════════════════════════════════════════════
   移动端 (≤768px) — 侧栏变抽屉
   ════════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* 侧栏默认隐藏在屏幕外 */
  .sidebar {
    transform: translateX(-100%);
    width: 82vw; min-width: 82vw; max-width: 300px;
    box-shadow: none;
    border-radius: 0 16px 16px 0;
  }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.15); }
  .sidebar-close { display: flex; align-items: center; justify-content: center; }

  /* 主区域全宽 */
  .main { margin-left: 0; margin-right: 0; }

  /* 显示汉堡按钮 */
  .header .hamburger { display: flex; }
  .header { padding: 10px 12px; }
  .header h1 { font-size: 15px; }

  /* 消息气泡 */
  .msg { max-width: 92%; font-size: 13.5px; padding: 9px 13px; border-radius: 14px; }

  /* 对话区 padding */
  .chat { padding: 10px 10px; gap: 8px; }

  /* 输入区 */
  .input-area { padding: 8px 10px; gap: 6px; }
  .input-area input { padding: 9px 12px; font-size: 13px; }
  .input-area button { padding: 9px 14px; font-size: 13px; min-height: 40px; }

  /* 指标卡片字体缩小 */
  .metric-value { font-size: 17px; }
  .metric-label { font-size: 10px; }

  /* 欢迎语 */
  .welcome-icon { font-size: 36px; }
  .welcome h2 { font-size: 15px; }
  .welcome p { font-size: 12px; }

  /* Trace 卡片 */
  .trace-card { font-size: 10px; gap: 4px; padding: 5px 6px; }
  .trace-icon { font-size: 11px; }
  .trace-label { font-size: 10px; min-width: 50px; }
}

/* ════════════════════════════════════════════════
   小屏手机 (≤400px)
   ════════════════════════════════════════════════ */
@media (max-width: 400px) {
  .header h1 { font-size: 14px; }
  .header p { display: none; }
  .msg { max-width: 94%; font-size: 13px; padding: 8px 11px; }
  .chat { padding: 8px 8px; gap: 6px; }
  .input-area input { font-size: 12px; }
  .metrics-grid { gap: 4px; }
  .metric-card { padding: 8px; }
  .metric-value { font-size: 15px; }
  .scenario-btn { font-size: 12px; padding: 8px 10px; }
  .trace-card { font-size: 10px; }
}

/* ── 桌面端宽屏优化 ── */
@media (min-width: 1200px) {
  .sidebar { width: 310px; min-width: 310px; max-width: 310px; }
  .main { margin-left: 310px; }
  .msg { max-width: 70%; }
}
</style>

// ═══════════════════════════════════════════════════════════
// 一、移动端侧栏控制
// ═══════════════════════════════════════════════════════════

function toggleSidebar(e) {
  if (e) e.stopPropagation();
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// 关闭侧栏的触摸手势（右滑）
let touchStartX = 0;
document.addEventListener('touchstart', e => {
  if (e.target.closest('.sidebar.open') || e.target.closest('.overlay')) {
    touchStartX = e.touches[0].clientX;
  }
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (touchStartX) {
    const dx = e.touches[0].clientX - touchStartX;
    if (dx < -60) { closeSidebar(); touchStartX = 0; }
  }
}, { passive: true });
document.addEventListener('touchend', () => { touchStartX = 0; });

// ═══════════════════════════════════════════════════════════
// 三、Agent 核心逻辑
// ═══════════════════════════════════════════════════════════

function detectLanguage(text) {
  const chineseChars = (text.match(/[\u4e00-\u9fff]/g) || []).length;
  return chineseChars > text.length * 0.3 ? "zh" : "en";
}

function recognizeIntent(text, lang) {
  const tl = text.toLowerCase();
  const scores = { ORDER: 0, SHIPPING: 0, REFUND: 0, COMPLAINT: 0, FAQ: 0, CHITCHAT: 0 };
  let matchedCategory = null;

  const op = lang === "zh" ? [/订单/, /我的订单/, /查.*单/, /状态/] : [/order/, /my order/, /where is my/, /check.*order/, /status/, /order number/];
  scores.ORDER = op.reduce((s, p) => s + (p.test(tl) ? 25 : 0), 0);
  if (/[A-Z]{2}\d{4}-\d{4}/.test(text)) scores.ORDER += 50;

  const sp = lang === "zh" ? [/物流/, /快递/, /到哪/, /多久到/, /什么时候到/, /跟踪/] : [/tracking/, /track/, /where is.*package/, /shipping/, /delivery status/, /arrive/];
  scores.SHIPPING = sp.reduce((s, p) => s + (p.test(tl) ? 25 : 0), 0);
  if (/[A-Z]{2,3}\d{8,12}/.test(text)) scores.SHIPPING += 50;

  const rp = [/refund/, /money back/, /cancel.*order/, /退货/, /退款/, /取消订单/];
  scores.REFUND = rp.reduce((s, p) => s + (p.test(tl) ? 25 : 0), 0);

  const ck = ["angry","complaint","terrible","awful","disappointed","bad experience","投诉","生气","糟糕","失望","举报","差评"];
  scores.COMPLAINT = ck.reduce((s, k) => s + (tl.includes(k) ? 30 : 0), 0);

  let bestFaq = 0;
  for (const [cat, kw] of Object.entries(FAQ_KEYWORDS)) {
    const score = kw[lang].reduce((s, k) => s + (tl.includes(k) ? 1 : 0), 0);
    if (score > bestFaq) { bestFaq = score; matchedCategory = cat; }
  }
  scores.FAQ = bestFaq * 20;

  const cc = lang === "zh" ? ["你好","谢谢","再见","嗨","早上好","晚上好"] : ["hi","hello","hey","thanks","thank","bye","good"];
  scores.CHITCHAT = cc.reduce((s, p) => s + (tl.includes(p) ? 30 : 0), 0);

  let primary = "FAQ", maxScore = 0;
  for (const [k, v] of Object.entries(scores)) { if (v > maxScore) { maxScore = v; primary = k; } }
  let confidence = Math.min(maxScore / 100, 1.0);
  if (confidence < 0.15) { primary = "FAQ"; matchedCategory = "物流运费"; confidence = 0.15; }

  return { intent: primary, confidence, matchedCategory };
}

function safetyCheck(intent, text, lang) {
  const tl = text.toLowerCase();
  const red = ["删除账户","delete account","delete my data","sue","lawyer","legal action","投诉到","起诉","律师","法院"];
  if (red.some(k => tl.includes(k))) return { level: "🔴 极高风险", action: "escalate", autoReply: lang === "zh" ? "我们非常重视您的反馈。为确保妥善处理，我将为您转接人工客服主管。请稍候..." : "We take your concerns very seriously. I'm escalating this to a human supervisor to ensure it's handled properly. Please hold..." };

  const orange = ["refund","退款","compensation","赔偿","modify","修改地址"];
  if (orange.some(k => tl.includes(k)) && ["REFUND","COMPLAINT"].includes(intent)) return { level: "🟠 高风险", action: "pre_fill_and_escalate", autoReply: lang === "zh" ? "退款请求需要人工审核确认。我已经整理了您的信息，正在转接客服专员。预计等待不超过 2 分钟。" : "Refund requests require human verification. I've prepared your information and am connecting you to a specialist. Estimated wait: under 2 minutes." };

  if (intent === "REFUND") return { level: "🟡 中风险", action: "auto_with_review", autoReply: null };
  return { level: "🟢 低风险", action: "auto", autoReply: null };
}

function toolSearchFAQ(query, lang, category) {
  if (category && FAQ_KNOWLEDGE[category]) return { success: true, results: [{ title: category, content: FAQ_KNOWLEDGE[category][lang], relevance: 0.95 }] };
  let best = null, bestScore = 0;
  for (const [cat, kw] of Object.entries(FAQ_KEYWORDS)) {
    const score = kw[lang].reduce((s, k) => s + (query.toLowerCase().includes(k) ? 1 : 0), 0);
    if (score > bestScore) { bestScore = score; best = cat; }
  }
  if (best && bestScore > 0) return { success: true, results: [{ title: best, content: FAQ_KNOWLEDGE[best][lang], relevance: Math.min(bestScore * 0.2, 0.95) }] };
  return { success: false, results: [] };
}

function toolGetOrderInfo(text, lang) {
  const m = text.match(/[A-Z]{2}\d{4}-\d{4}/);
  if (m && MOCK_ORDERS[m[0]]) {
    const o = MOCK_ORDERS[m[0]];
    return { success: true, order_id: m[0], customer: o.customer, platform: o.platform, status: lang === "zh" ? o.status : o.status_en, items: o.items, total: "$" + o.total, created: o.created, tracking_no: o.tracking_no, carrier: o.carrier };
  }
  if (m) return { success: false, order_id: m[0], error: "ORDER_NOT_FOUND", message: lang === "zh" ? "未找到该订单，请确认订单号是否正确" : "Order not found. Please double-check the order number." };
  return { success: true, need_order_number: true, message: lang === "zh" ? "请提供您的订单号（格式如 US2024-3821），我来帮您查询。\n\n💡 提示：订单号可以在确认邮件中找到。" : "Please provide your order number (format: US2024-3821) and I'll look it up for you.\n\n💡 Tip: You can find your order number in the confirmation email." };
}

function toolTrackPackage(tn, lang) {
  if (MOCK_TRACKING[tn]) {
    const t = MOCK_TRACKING[tn];
    return { success: true, tracking_no: tn, status: t.status, status_en: t.status_en, current_location: t.current_location, estimated_delivery: t.estimated_delivery, days_in_transit: t.days_in_transit, history: t.history };
  }
  return { success: false, tracking_no: tn, error: "INVALID_TRACKING", message: lang === "zh" ? "物流单号无效，请确认是否输入正确" : "Invalid tracking number. Please verify and try again." };
}

// ═══════════════════════════════════════════════════════════
// 四、回复生成器
// ═══════════════════════════════════════════════════════════

function genFAQReply(faqResult, lang, category) {
  if (faqResult.success && faqResult.results.length) {
    const c = faqResult.results[0].content;
    const title = category || faqResult.results[0].title;
    return lang === "zh" ? `📚 以下是关于「${title}」的详细信息：\n\n${c}\n\n还有其他需要帮您的吗？` : `📚 Here's what I found about "${title}":\n\n${c}\n\nIs there anything else I can help with?`;
  }
  return lang === "zh" ? "抱歉，我暂时没有找到相关的信息。需要我帮您转接人工客服吗？" : "I couldn't find relevant information on this. Would you like me to connect you with a human agent?";
}

function genOrderReply(o, lang) {
  if (o.need_order_number) return o.message;
  if (!o.success) return o.message || "Order lookup failed.";
  const se = { "Delivered":"✅","已签收":"✅","In Transit":"🚚","运输中":"🚚","Shipped":"📦","已发货":"📦","Processing":"⏳","备货中":"⏳","Paid":"💳","已付款":"💳" };
  const emoji = se[o.status] || "📋";
  const tinfo = o.tracking_no ? `${lang === "zh" ? "物流单号" : "Tracking"}: ${o.tracking_no} (${o.carrier})` : (lang === "zh" ? "📌 尚未发货，暂无物流信息" : "📌 Not yet shipped — no tracking available");
  return lang === "zh"
    ? `📋 订单查询结果\n\n订单号：${o.order_id}\n下单人：${o.customer}\n平台：${o.platform}\n商品：${o.items}\n金额：${o.total}\n下单时间：${o.created}\n状态：${emoji} ${o.status}\n${tinfo}\n\n还有其他需要帮您的吗？`
    : `📋 Order Lookup Result\n\nOrder ID: ${o.order_id}\nCustomer: ${o.customer}\nPlatform: ${o.platform}\nItems: ${o.items}\nTotal: ${o.total}\nOrder Date: ${o.created}\nStatus: ${emoji} ${o.status}\n${tinfo}\n\nAnything else I can help with?`;
}

function genTrackingReply(t, lang) {
  if (!t.success) return t.message || "Tracking lookup failed.";
  const hist = t.history.map(h => `  ${h.time} — ${h.location}: ${h.desc}`).join("\n");
  return lang === "zh"
    ? `📦 物流追踪结果\n\n单号：${t.tracking_no}\n状态：${t.status}\n当前位置：${t.current_location}\n预计送达：${t.estimated_delivery}\n已运输：${t.days_in_transit} 天\n\n📋 物流轨迹：\n${hist}\n\n还有其他需要帮您的吗？`
    : `📦 Package Tracking\n\nTracking No: ${t.tracking_no}\nStatus: ${t.status_en}\nCurrent Location: ${t.current_location}\nEst. Delivery: ${t.estimated_delivery}\nDays in Transit: ${t.days_in_transit} days\n\n📋 Tracking History:\n${hist}\n\nAnything else I can help with?`;
}

function genChitchat(text, lang) {
  const tl = text.toLowerCase();
  const gz = ["你好","嗨","早上好","晚上好","您好"], ge = ["hi","hello","hey","good morning","good evening"];
  const tz = ["谢谢","感谢","多谢","太好了"], te = ["thanks","thank","appreciate","great","awesome"];
  if (lang === "zh") {
    if (gz.some(g => tl.includes(g))) return "您好！👋 我是 ShopHelper，您的跨境电商客服助手。有什么可以帮您的吗？";
    if (tz.some(t => tl.includes(t))) return "不客气！很高兴能帮到您～ 还有其他问题随时问我哦 😊";
    return "您好！有什么可以帮助您的呢？例如：查订单、查物流、了解退换政策、尺码建议等。";
  }
  if (ge.some(g => tl.includes(g))) return "Hello! 👋 I'm ShopHelper, your cross-border e-commerce assistant. How can I help you today?";
  if (te.some(t => tl.includes(t))) return "You're welcome! Glad I could help 😊 Feel free to reach out anytime!";
  return "Hello! How can I assist you? For example: check order status, track a package, learn about return policies, or get size recommendations.";
}

// ═══════════════════════════════════════════════════════════
// 五、ReAct Agent 主循环
// ═══════════════════════════════════════════════════════════

function agentProcess(userInput) {
  const trace = [];
  const lang = detectLanguage(userInput);
  trace.push({ icon: "🔍", step: "语言检测", detail: `检测为 ${lang === "zh" ? "中文" : "English"}` });

  const { intent, confidence, matchedCategory } = recognizeIntent(userInput, lang);
  const intentNames = { FAQ: "知识库查询", ORDER: "订单查询", SHIPPING: "物流追踪", REFUND: "退款请求", COMPLAINT: "投诉处理", CHITCHAT: "日常闲聊" };
  const intentIcons = { FAQ: "📚", ORDER: "📋", SHIPPING: "📦", REFUND: "💰", COMPLAINT: "⚠️", CHITCHAT: "💬" };
  trace.push({ icon: intentIcons[intent] || "🧠", step: "意图识别", detail: `${intentNames[intent] || intent} (置信度: ${(confidence * 100).toFixed(0)}%)` });

  const safety = safetyCheck(intent, userInput, lang);
  trace.push({ icon: "🛡️", step: "安全护栏", detail: `风险等级: ${safety.level} → ${safety.action}` });
  if (safety.autoReply) return { reply: safety.autoReply, language: lang, intent, confidence, safety, trace };

  let reply = "";
  if (intent === "FAQ") {
    trace.push({ icon: "💭", step: "ReAct-推理", detail: "判断为 FAQ → 调用 search_faq 检索知识库" });
    const faqResult = toolSearchFAQ(userInput, lang, matchedCategory);
    trace.push({ icon: "🔧", step: "ReAct-行动", detail: `调用 search_faq(query='${userInput.substring(0, 30)}...', lang=${lang})` });
    trace.push({ icon: "👁️", step: "ReAct-观察", detail: `返回 ${faqResult.results.length} 条结果` + (faqResult.success ? "" : " — 未找到匹配") });
    reply = genFAQReply(faqResult, lang, matchedCategory);
  } else if (intent === "ORDER") {
    trace.push({ icon: "💭", step: "ReAct-推理", detail: "判断为订单查询 → 调用 get_order_info" });
    const o = toolGetOrderInfo(userInput, lang);
    trace.push({ icon: "🔧", step: "ReAct-行动", detail: "调用 get_order_info()" });
    if (o.need_order_number) trace.push({ icon: "👁️", step: "ReAct-观察", detail: "未检测到订单号 → 引导用户提供" });
    else if (o.success) trace.push({ icon: "👁️", step: "ReAct-观察", detail: `找到订单 ${o.order_id}，状态: ${o.status}` });
    else trace.push({ icon: "👁️", step: "ReAct-观察", detail: "订单未找到" });
    reply = genOrderReply(o, lang);
  } else if (intent === "SHIPPING") {
    trace.push({ icon: "💭", step: "ReAct-推理", detail: "判断为物流追踪 → 调用 track_package" });
    const tnMatch = userInput.match(/[A-Z]{2,3}\d{8,12}/);
    if (tnMatch) {
      const t = toolTrackPackage(tnMatch[0], lang);
      trace.push({ icon: "🔧", step: "ReAct-行动", detail: `调用 track_package(${tnMatch[0]})` });
      trace.push({ icon: "👁️", step: "ReAct-观察", detail: `物流: ${t.success ? (t.status || t.status_en) : "无效单号"}` });
      reply = genTrackingReply(t, lang);
    } else {
      const o = toolGetOrderInfo(userInput, lang);
      if (o.success && o.tracking_no) {
        trace.push({ icon: "🔧", step: "ReAct-行动", detail: `get_order_info → tracking_no: ${o.tracking_no}` });
        const t = toolTrackPackage(o.tracking_no, lang);
        trace.push({ icon: "🔧", step: "ReAct-行动", detail: `track_package(${o.tracking_no})` });
        trace.push({ icon: "👁️", step: "ReAct-观察", detail: `物流: ${t.success ? (t.status || t.status_en) : "未知"}` });
        reply = genTrackingReply(t, lang);
      } else if (o.need_order_number) {
        reply = o.message;
      } else {
        trace.push({ icon: "👁️", step: "ReAct-观察", detail: "无法获取物流单号 → 引导用户" });
        reply = lang === "zh" ? "请提供您的物流单号（tracking number），我来帮您查询包裹状态。\n\n💡 物流单号可以在发货确认邮件中找到。" : "Please provide your tracking number and I'll check your package status for you.\n\n💡 You can find the tracking number in your shipping confirmation email.";
      }
    }
  } else if (intent === "REFUND") {
    trace.push({ icon: "💭", step: "ReAct-推理", detail: "退款/退换货 → 查政策 + 验证订单" });
    toolSearchFAQ("退换货政策", lang, "退换货政策");
    trace.push({ icon: "🔧", step: "ReAct-行动", detail: "search_faq('退换货政策') → 获取政策" });
    const o = toolGetOrderInfo(userInput, lang);
    if (o.success && !o.need_order_number) {
      trace.push({ icon: "🔧", step: "ReAct-行动", detail: `get_order_info() → ${o.order_id}` });
      trace.push({ icon: "👁️", step: "ReAct-观察", detail: `订单: ${o.status} — 已关联退款` });
    } else {
      trace.push({ icon: "👁️", step: "ReAct-观察", detail: "未找到关联订单 — 需提供订单号" });
    }
    trace.push({ icon: "🛡️", step: "安全护栏", detail: "🟠 高风险 → 加入人工审核队列" });
    if (o.success && !o.need_order_number) {
      reply = lang === "zh"
        ? `📋 退款/退换货请求已受理\n\n已为您查询：\n• 订单 ${o.order_id} — ${o.status}\n• 商品：${o.items}\n\n📌 退款政策摘要：\n${FAQ_KNOWLEDGE['退换货政策']['zh'].substring(0, 200)}...\n\n⚠️ 退款需要人工审核，我已为您提交请求。客服专员将在 24 小时内通过邮件与您联系。`
        : `📋 Refund/Return Request Submitted\n\nOrder found:\n• ${o.order_id} — ${o.status}\n• Items: ${o.items}\n\n📌 Return Policy Summary:\n${FAQ_KNOWLEDGE['退换货政策']['en'].substring(0, 200)}...\n\n⚠️ Refunds require human review. I've submitted your request — a specialist will contact you via email within 24 hours.`;
    } else {
      reply = lang === "zh" ? "请问您的订单号是什么？我来帮您提交退款/退换货申请。\n\n💡 订单号格式如 US2024-3821，可在确认邮件中找到。" : "Could you provide your order number? I'll help submit your refund/return request.\n\n💡 Order number format: US2024-3821 (found in your confirmation email).";
    }
  } else if (intent === "COMPLAINT") {
    trace.push({ icon: "💭", step: "ReAct-推理", detail: "投诉/不满情绪 → 安抚 + 升级人工" });
    trace.push({ icon: "🛡️", step: "安全护栏", detail: "🔴 自动升级到人工客服主管" });
    reply = lang === "zh"
      ? `非常抱歉给您带来了不好的体验！😔\n\n我已经记录了您的反馈，并为您升级到客服主管处理。我们非常重视每一位顾客的感受。\n\n📌 预计 2 小时内会有专员通过邮件与您联系。如需加速处理，您也可以回复提供更多细节。`
      : `I'm truly sorry about your experience! 😔\n\nI've logged your feedback and escalated this to a customer service supervisor. We take every customer's concerns very seriously.\n\n📌 A specialist will reach out via email within 2 hours. Feel free to reply with more details to help expedite the process.`;
  } else {
    trace.push({ icon: "💭", step: "ReAct-推理", detail: "闲聊类 → 直接回复" });
    reply = genChitchat(userInput, lang);
  }
  return { reply, language: lang, intent, confidence, safety, trace };
}

function addMessage(role, content, trace, safety) {
  const bubble = document.createElement("div");
  bubble.className = "msg " + role;
  bubble.textContent = content;

  if (role === "agent" && trace) {
    const traceId = "trace-" + Date.now();
    const toggle = document.createElement("div");
    toggle.className = "trace-toggle";
    toggle.innerHTML = "🔍 查看思考过程";
    toggle.onclick = () => {
      const panel = document.getElementById(traceId);
      panel.classList.toggle("open");
      toggle.innerHTML = panel.classList.contains("open") ? "🔍 收起思考过程" : "🔍 查看思考过程";
    };

    const panel = document.createElement("div");
    panel.className = "trace-panel";
    panel.id = traceId;
    panel.innerHTML = trace.map(t =>
      `<div class="trace-card">
        <span class="trace-icon">${t.icon}</span>
        <span class="trace-label">${t.step}</span>
        <span class="trace-detail">${t.detail}</span>
      </div>`
    ).join("");

    if (safety) {
      const badgeMap = { auto: "badge-auto", escalate: "badge-escalate", pre_fill_and_escalate: "badge-escalate", auto_with_review: "badge-escalate" };
      const badgeEl = document.createElement("span");
      badgeEl.className = "badge " + (badgeMap[safety.action] || "badge-auto");
      badgeEl.textContent = safety.level;
      toggle.appendChild(badgeEl);
    }

    const wrapper = document.createElement("div");
    wrapper.style.maxWidth = "92%";
    wrapper.style.alignSelf = "flex-start";
    wrapper.appendChild(bubble);
    wrapper.appendChild(toggle);
    wrapper.appendChild(panel);
    chatDiv.appendChild(wrapper);
  } else if (role === "agent") {
    const wrapper = document.createElement("div");
    wrapper.style.maxWidth = "92%";
    wrapper.style.alignSelf = "flex-start";
    wrapper.appendChild(bubble);
    chatDiv.appendChild(wrapper);
  } else {
    chatDiv.appendChild(bubble);
  }
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showWelcome() {
  chatDiv.innerHTML = "";
  const w = document.createElement("div");
  w.className = "welcome";
  w.innerHTML = `
    <div class="welcome-icon">🌐</div>
    <h2>👋 Welcome to ShopHelper!<br>欢迎使用 ShopHelper！</h2>
    <p>
      I'm your cross-border e-commerce customer service assistant.<br>
      我是您的跨境电商客服助手。<br><br>
      • 📋 <b>查订单</b> — 查询您的订单状态<br>
      • 📦 <b>查物流</b> — 追踪包裹物流信息<br>
      • 📚 <b>退换/尺码政策</b> — 了解退换货、运费等<br>
      • 💰 <b>退款申请</b> — 提交退款/退换货申请<br><br>
      点击左上角 <b>☰</b> 选择快捷场景，或直接跟我对话吧！
    </p>
  `;
  chatDiv.appendChild(w);
}

function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  if (chatDiv.querySelector(".welcome")) chatDiv.innerHTML = "";
  addMessage("user", text);
  sendBtn.disabled = true;
  inputEl.value = "";
  inputEl.placeholder = "Agent 思考中... / Agent is thinking...";

  setTimeout(() => {
    const result = agentProcess(text);
    addMessage("agent", result.reply, result.trace, result.safety);
    refreshMetrics();
    sendBtn.disabled = false;
    inputEl.placeholder = "请输入您的问题... / Type your question...";
    inputEl.focus();
  }, 300);
}

// ═══════════════════════════════════════════════════════════
// 七、启动
// ═══════════════════════════════════════════════════════════

renderScenarios();
showWelcome();
refreshMetrics();
inputEl.focus();
</script>
</body>
</html>
